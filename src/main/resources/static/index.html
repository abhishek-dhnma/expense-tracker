<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Expense Tracker</h1>
            <p>Keep track of your money easily.</p>
        </header>

        <main>
            <section class="card form-section">
                <h2>Add Expense</h2>
                <form id="expenseForm">
                    <div id="formMessage" class="message hidden"></div>
                    
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" name="amount" step="0.01" placeholder="e.g. 500" required>
                        <span class="error-text" id="amountError"></span>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" required>
                            <option value="" disabled selected>Select a category</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Other">Other</option>
                        </select>
                        <span class="error-text" id="categoryError"></span>
                    </div>

                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date" required>
                        <span class="error-text" id="dateError"></span>
                    </div>

                    <div class="form-group">
                        <label for="description">Description (Optional)</label>
                        <input type="text" id="description" name="description" placeholder="e.g. Lunch with friends">
                        <span class="error-text" id="descriptionError"></span>
                    </div>

                    <button type="submit" id="submitBtn">
                        <span class="btn-text">Add Expense</span>
                        <div class="spinner hidden"></div>
                    </button>
                </form>
            </section>

            <section class="card list-section">
                <div class="list-header">
                    <h2>Recent Expenses</h2>
                    <div class="controls">
                        <select id="filterCategory">
                            <option value="">All Categories</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Other">Other</option>
                        </select>
                        <select id="sortDate">
                            <option value="date_desc">Newest First</option>
                            <option value="date_asc">Oldest First</option>
                        </select>
                    </div>
                </div>

                <div id="loadingExpenses" class="message hidden">Loading expenses...</div>
                <div id="expenseList" class="expense-list">
                    <!-- Expenses will be injected here -->
                </div>

                <div class="total-section">
                    <h3>Total: <span id="totalAmount">₹0.00</span></h3>
                </div>

                <div id="categorySummary" class="category-summary">
                    <!-- Category totals injected here -->
                </div>
            </section>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
